# Render Blueprint - Infrastructure as Code
# See: https://render.com/docs/blueprint-spec

services:
  # Backend - Spring Boot Web Service
  - type: web
    name: url-shortener-api
    runtime: docker
    repo: https://github.com/sarthak425/url-shortener.git
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_HOST
        fromDatabase:
          name: url-shortener-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: url-shortener-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: url-shortener-db
          property: database
      - key: DATABASE_USERNAME
        fromDatabase:
          name: url-shortener-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: url-shortener-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://url-shortener-frontend.onrender.com
      - key: PORT
        value: "8083"

  # Frontend - React Static Site
  - type: web
    name: url-shortener-frontend
    runtime: static
    repo: https://github.com/sarthak425/url-shortener.git
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://url-shortener-api.onrender.com/api
      - key: VITE_BACKEND_URL
        value: https://url-shortener-api.onrender.com

databases:
  - name: url-shortener-db
    plan: free
    databaseName: urlshortener
