# Production profile for Render deployment

# Port - Render sets PORT env var
server.port=${PORT:8083}

# PostgreSQL Database Configuration (Render)
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate (JPA) Settings for PostgreSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Settings
jwt.secret=${JWT_SECRET}
jwt.expiration=172800000

# CORS - set this to your Render frontend URL
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}
